<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Change Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="user-theme">
    <div class="dashboard-container">
        <header class="top-nav" style="justify-content: flex-start;">
            <a href="{{ url_for('user.dashboard') }}"
                style="text-decoration: none; color: var(--primary-color); font-weight: 600; display: flex; align-items: center; gap: 0.5rem;">
                <span>←</span> Back to Dashboard
            </a>
        </header>

        <main class="content" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
            <div class="card interactive" style="max-width: 500px; width: 100%; padding: 3rem; cursor: default;">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <h1 style="font-size: 2rem; margin-bottom: 0.5rem; color: #1e293b;">Settings</h1>
                    <p style="color: #64748b;">Update your account security preferences.</p>
                </div>

                <form action="{{ url_for('user.settings') }}" method="POST">
                    <div class="input-group" style="margin-bottom: 1.5rem;">
                        <label for="current_password" style="font-weight: 600; color: #475569;">Current Password</label>
                        <input type="password" id="current_password" name="current_password" required
                            placeholder="Enter existing password"
                            style="width: 100%; padding: 0.85rem; border: 1px solid #e2e8f0; border-radius: 0.75rem;">
                    </div>

                    <div class="input-group" style="margin-bottom: 2rem;">
                        <label for="new_password" style="font-weight: 600; color: #475569;">New Password</label>
                        <input type="password" id="new_password" name="new_password" required
                            placeholder="Enter new password"
                            style="width: 100%; padding: 0.85rem; border: 1px solid #e2e8f0; border-radius: 0.75rem;">
                    </div>

                    <button type="submit" class="submit-btn"
                        style="width: 100%; padding: 1rem; background: var(--primary-color); border-radius: 0.75rem; font-weight: 700; transition: transform 0.2s;">
                        Update Password
                    </button>
                </form>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                <div class="flash-messages" style="margin-top: 1.5rem;">
                    {% for category, message in messages %}
                    <div class="alert {{ category }}" style="text-align: center; border-radius: 0.75rem;">{{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}
                {% endwith %}
            </div>
        </main>
    </div>
</body>

</html>
