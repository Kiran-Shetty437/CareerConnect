{% extends "layout.html" %}
{% block title %}CareerConnect - Admin 2FA Verification{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div style="display: flex; min-height: 100vh; width: 100vw; background-color: var(--background); justify-content: center; align-items: center; padding: 2rem;">
    <div class="cc-card animate-stagger" style="max-width: 450px; width: 100%; padding: 3rem; text-align: center;">
        <div class="cc-logo-icon mx-auto mb-6" style="width: 72px; height: 72px; display: flex; align-items: center; justify-content: center; border-radius: 20px; margin: 0 auto 2rem auto;">
            <i class="fas fa-shield-alt text-white" style="font-size: 2.2rem;"></i>
        </div>

        <h2 class="mb-4 text-glow" style="font-size: 2.2rem;">Admin Verification</h2>
        <p class="text-secondary mb-4" style="font-size: 1.1rem;">Enter the 6-digit code from your authenticator app to access the dashboard.</p>
        

        
        <form action="{{ url_for('auth.admin_2fa_verify') }}" method="POST">
            <div class="cc-form-group">
                <div class="otp-container">
                    <input type="text" maxlength="1" class="otp-box" oninput="handleOtpInput(this, 0)" onkeydown="handleOtpKeydown(this, 0, event)" onpaste="handleOtpPaste(event)">
                    <input type="text" maxlength="1" class="otp-box" oninput="handleOtpInput(this, 1)" onkeydown="handleOtpKeydown(this, 1, event)" onpaste="handleOtpPaste(event)">
                    <input type="text" maxlength="1" class="otp-box" oninput="handleOtpInput(this, 2)" onkeydown="handleOtpKeydown(this, 2, event)" onpaste="handleOtpPaste(event)">
                    <input type="text" maxlength="1" class="otp-box" oninput="handleOtpInput(this, 3)" onkeydown="handleOtpKeydown(this, 3, event)" onpaste="handleOtpPaste(event)">
                    <input type="text" maxlength="1" class="otp-box" oninput="handleOtpInput(this, 4)" onkeydown="handleOtpKeydown(this, 4, event)" onpaste="handleOtpPaste(event)">
                    <input type="text" maxlength="1" class="otp-box" oninput="handleOtpInput(this, 5)" onkeydown="handleOtpKeydown(this, 5, event)" onpaste="handleOtpPaste(event)">
                </div>
                <input type="hidden" id="otp" name="otp">
            </div>
            <button type="submit" class="cc-btn cc-btn-primary w-full animate-glare" style="height: 56px; font-size: 1.15rem; border-radius: 16px;">Verify Access</button>
            <div class="mt-6">
                <a href="{{ url_for('auth.login') }}" class="text-secondary" style="font-size: 0.95rem; font-weight: 600;"><i class="fas fa-arrow-left mr-2"></i> Back to Login</a>
            </div>
        </form>
    </div>
</div>

<script>
    function handleOtpInput(input, index) {
        if (input.value.length === 1 && index < 5) {
            document.querySelectorAll('.otp-box')[index + 1].focus();
        }
        updateOtpHiddenValue();
    }

    function handleOtpKeydown(input, index, e) {
        if (e.key === "Backspace" && input.value === "" && index > 0) {
            document.querySelectorAll('.otp-box')[index - 1].focus();
        }
    }

    function handleOtpPaste(e) {
        e.preventDefault();
        const data = e.clipboardData.getData('text').slice(0, 6);
        const boxes = document.querySelectorAll('.otp-box');
        for (let i = 0; i < data.length; i++) {
            if (boxes[i]) {
                boxes[i].value = data[i];
            }
        }
        updateOtpHiddenValue();
        if (data.length > 0) {
            boxes[Math.min(data.length, 5)].focus();
        }
    }

    function updateOtpHiddenValue() {
        const boxes = document.querySelectorAll('.otp-box');
        let otp = "";
        boxes.forEach(box => otp += box.value);
        document.getElementById('otp').value = otp;
    }
</script>
{% endblock %}
